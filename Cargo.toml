# NOTE: This is a light scaffold. Pin/adjust versions and feature flags yourself
# when you set up the espup toolchain and esp-idf-template — see README "Toolchain".
[package]
name = "smart-alarm-clock"
version = "0.1.0"
edition = "2021"
resolver = "2"
rust-version = "1.77"

[[bin]]
name = "smart-alarm-clock"
harness = false # do not use the built-in test harness on the device target

[profile.release]
opt-level = "s"

[profile.dev]
debug = true
opt-level = "z"

[dependencies]
# --- ESP-IDF (std path: esp-idf-hal + esp-idf-svc, FreeRTOS underneath) ---
esp-idf-svc = { version = "0.49", default-features = false } # WiFi STA+AP, HTTP server, mDNS, MQTT, SNTP, NVS
esp-idf-hal = "0.44"                                          # I2C, SPI, LEDC/PWM, GPIO
esp-idf-sys = "0.35"
embedded-hal = "1.0"
log = "0.4"

# --- Peripheral drivers (verify exact crates/versions during bench bring-up) ---
# ds323x          = "0.6"   # DS3231 RTC (timekeeping + internal temp)
# smart-leds      = "0.4"   # APA102 / SK9822 SPI LED matrix
# apa102-spi      = "0.4"   # or the driver that matches the chosen panel
# embedded-graphics = "0.8" # render time / fields onto the matrix
# vcnl4040        = "*"     # TODO: pick/confirm a VCNL4040 driver crate (proximity + lux)

[build-dependencies]
embuild = "0.32"
