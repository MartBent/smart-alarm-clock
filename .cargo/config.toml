[build]
target = "xtensa-esp32s3-espidf"

[alias]
build-ttgo = "build --target xtensa-esp32-espidf"
run-ttgo = "run --target xtensa-esp32-espidf"

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor" # `cargo run` builds, flashes over USB-C, and opens the monitor
rustflags = ["--cfg", "espidf_time64"] # esp-idf uses 64-bit time_t

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor" # TTGO T-Display classic ESP32
rustflags = ["--cfg", "espidf_time64"] # esp-idf uses 64-bit time_t

[unstable]
build-std = ["std", "panic_abort"]

[env]
# Pin the ESP-IDF version esp-idf-sys downloads + builds against.
ESP_IDF_VERSION = "v5.2.3"
# Keep the bare scaffold build small: generated dummy main + pthread/std support.
ESP_IDF_COMPONENTS = "main;pthread"
